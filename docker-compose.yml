services:
  dev:
    hostname: ${COMPOSE_PROJECT_NAME:-inside-docker}
    build:
      context: .
      args:
        USERNAME: ${CONTAINER_USER:-dev}
        USER_UID: ${HOST_UID:-1000}
        USER_GID: ${HOST_GID:-1000}
        OPENCODE_NPM_PACKAGE: ${OPENCODE_NPM_PACKAGE:-opencode-ai}
    image: ${COMPOSE_PROJECT_NAME:-emacs-opencode}-dev:latest
    container_name: ${COMPOSE_PROJECT_NAME:-emacs-opencode}-dev
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace/${WORKSPACE_DIRNAME}
    tty: true
    stdin_open: true
    init: true
    security_opt:
      - no-new-privileges:true
    pids_limit: ${PIDS_LIMIT:-512}
    cpus: ${CPU_LIMIT:-4}
    mem_limit: ${MEM_LIMIT:-8g}
    environment:
      TZ: ${TZ:-UTC}
      WAYLAND_DISPLAY: ${WAYLAND_DISPLAY:-wayland-0}
      XDG_RUNTIME_DIR: /tmp
      HOST_REPO_PATH: ${HOST_REPO_PATH}
      WORKSPACE_DIRNAME: ${WORKSPACE_DIRNAME}
      CONTAINER_PROMPT_PREFIX: C
      OPENCODE_HOME: /opencode-state
      OPENCODE_CONFIG_DIR: /opencode-state
      OPENCODE_AUTH_DIR: /opencode-state
      NPM_CONFIG_CACHE: /cache/npm
      PNPM_HOME: /cache/pnpm
      PNPM_STORE_PATH: /cache/pnpm-store
      PIP_CACHE_DIR: /cache/pip
    volumes:
      - type: bind
        source: ${HOST_REPO_PATH}
        target: /workspace/${WORKSPACE_DIRNAME}
      - type: bind
        source: ${HOST_SECRETS_BUNDLE_DIR:-./.runtime/secrets}
        target: /secrets
        read_only: true
      - type: bind
        source: ${WAYLAND_SOCKET_PATH}
        target: /tmp/${WAYLAND_DISPLAY:-wayland-0}
      - type: bind
        source: ${HOST_OPENCODE_DIR}
        target: /opencode-state
      - type: bind
        source: ${HOST_EMACS_D_DIR}
        target: /home/${CONTAINER_USER:-dev}/.emacs.d
      - type: bind
        source: ${HOST_NPM_CACHE_DIR}
        target: /cache/npm
      - type: bind
        source: ${HOST_PNPM_STORE_DIR}
        target: /cache/pnpm-store
      - type: bind
        source: ${HOST_PNPM_HOME_DIR}
        target: /cache/pnpm
      - type: bind
        source: ${HOST_PIP_CACHE_DIR}
        target: /cache/pip
      - type: bind
        source: ${HOST_CACHE_DIR}
        target: /home/${CONTAINER_USER:-dev}/.cache
      - type: bind
        source: ${HOST_REPO_PATH}/emacs.d
        target: /opt/emacs-base
        read_only: true
